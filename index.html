<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">

        <div class="header">
            <div class="avatar"></div>
            <div>
                <h2>SIGN IN</h2>
                <p class="small">sign in to proceed further</p>
            </div>
        </div>

        <label for="phoneno">Mobile Number</label>
        <input type="text" id="phoneno" placeholder="" maxlength="10">

        <p class="error">10 Digit Valid Mobile No. Required</p>

        <button class="btn">NEXT</button>

    </div>
</body>
</html>
